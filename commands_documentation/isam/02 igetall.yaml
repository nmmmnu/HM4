- id:          IGETALL
  name:        IGETALL
  usage:       IGETALL schema key
  params:
    items:
    - k: schema
      v: field definitions in format size:field_name,size:field_name,...
    - k: key
      v: the key holding the fixed-width string

  description: |
    Returns all fields and values of isam object stored in *key*.<br />
    The data is parsed using the provided schema. Trailing spaces (padding) are automatically stripped from the returned values.

  return_type: array
  return:      flat array of field names and their corresponding values (field1, value1, field2, value2, ...)
  version:     1.3.14.1
  complexity:  READ
  mutable:     false
  compatible:  false
  example:     |
    127.0.0.1:6379> isetall 3:id,10:name,2:country a 1 Niki BG
    (integer) 1
    127.0.0.1:6379> igetall 3:id,10:name,2:country a
    1) "id"
    2) "1"
    3) "name"
    4) "Niki"
    5) "country"
    6) "BG"

