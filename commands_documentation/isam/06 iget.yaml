- id:          IGET
  name:        IGET

  usage:       IGET schema key field
  params:
    items:
    - k: schema
      v: field definitions in format size:field_name,size:field_name,...
    - k: key
      v: the key holding the fixed-width string
    - k: field
      v: the specific field name to retrieve

  description: |
    Retrieves the value of a single specified *field* from the isam object stored in *key*.<br />
    The data is parsed using the provided schema. Trailing spaces (padding) are automatically stripped from the returned values.

  return_type: string
  return:      the stripped value of the field, or an empty string if the field does not exist in the schema
  version:     1.3.14.1
  complexity:  READ
  mutable:     false
  compatible:  false
  example:     |
    127.0.0.1:6379> isetall 3:id,10:name,2:country a 1 Niki BG
    (integer) 1
    127.0.0.1:6379> iget 3:id,10:name,2:country a name
    "Niki"
