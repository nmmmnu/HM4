- id:          IDEL
  name:        IDEL

  usage:       IDEL schema key field [field ...]
  params:
    items:
    - k: schema
      v: field definitions in format size:field_name,size:field_name,...
    - k: key
      v: the key holding the fixed-width string
    - k: field
      v: one or more field names to clear

  description: |
    "Deletes" data from specified *field*, *field* within the isam object at the specified *key*.<br />
    The new empty values are written directly onto their exact byte positions inside the existing string layout, leaving unspecified fields untouched.

  return_type: integer
  return:      1
  version:     1.3.14.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> isetall 3:id,10:name,2:country a 1 Niki BG
    (integer) 1
    127.0.0.1:6379> get a
    "1  Niki      BG"
    127.0.0.1:6379> idel 3:id,10:name,2:country a name country
    (integer) 1
    127.0.0.1:6379> get a
    "1              "
