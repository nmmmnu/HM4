- id:          IGETKEYS
  name:        IGETKEYS

  usage:       IGETKEYS schema key
  params:
    items:
    - k: schema
      v: field definitions in format size:field_name,size:field_name,...
    - k: key
      v: the key holding the fixed-width string

  description: |
    Returns only fields of the structured object stored in *key*.<br />
    The data is parsed using the provided schema. Trailing spaces (padding) are automatically stripped from the returned values.<br />
    The command does not touch the *key*, but retrieve the keys from the field definitions, so lookup complexity is constant.

  return_type: array
  return:      array of field names
  version:     1.3.14.1
  complexity:  n/a
  mutable:     false
  compatible:  false
  example:     |
    127.0.0.1:6379> isetall 3:id,10:name,2:country a 1 Niki BG
    (integer) 1
    127.0.0.1:6379> igetkeys 3:id,10:name,2:country a
    1) "id"
    2) "name"
    3) "country"
