- id:          ISETALL
  name:        ISETALL

  usage:       ISETALL schema key val [val ...]
  params:
    items:
    - k: schema
      v: field definitions in format size:field_name,size:field_name,...
    - k: key
      v: the key holding the fixed-width string
    - k: val
      v: values for all fields, provided sequentially in the schema order

  description: |
    Initializes or completely overwrites the isam object at the specified *key*.<br />
    Values are packed into a single string according to the schema byte sizes.<br />
    Shorter values are padded with trailing spaces. Values exceeding their allocated field size are truncated automatically.

  return_type: integer
  return:      1
  version:     1.3.14.1
  complexity:  WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> isetall 3:id,10:name,2:country a 1 Niki BG
    (integer) 1
    127.0.0.1:6379> get a
    "1  Niki      BG"
