- id:          IMGET
  name:        IMGET

  usage:       IMGET schema key field [field ...]
  params:
    items:
    - k: schema
      v: field definitions in format size:field_name,size:field_name,...
    - k: key
      v: the key holding the fixed-width string
    - k: field
      v: one or more field names to retrieve

  description: |
    Retrieves the value of the specified *field*, *field* from the isam object stored in *key*.<br />
    The data is parsed using the provided schema. Trailing spaces (padding) are automatically stripped from the returned values.

  return_type: array
  return:      array of stripped values corresponding to the requested fields
  version:     1.3.14.1
  complexity:  READ
  mutable:     false
  compatible:  false
  example:     |
    127.0.0.1:6379> isetall 3:id,10:name,2:country a 1 Niki BG
    (integer) 1
    127.0.0.1:6379> imget 3:id,10:name,2:country a name country id id non_existent id
    1) "Niki"
    2) "BG"
    3) "1"
    4) "1"
    5) ""
    6) "1"
    127.0.0.1:6379> imget 3:id,10:name,2:country a name
    1) "Niki"
    127.0.0.1:6379> imget 3:id,10:name,2:country a name name
    1) "Niki"
    2) "Niki"
