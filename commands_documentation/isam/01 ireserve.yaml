- id:          IRESERVE
  name:        IRESERVE

  usage:       IRESERVE schema key
  params:
    items:
    - k: schema
      v: field definitions in format size:field_name,size:field_name,...
    - k: key
      v: the key holding the fixed-width string

  description: |
    Create new, empty isam object *key*

  return_type: integer
  return:      1
  version:     1.3.14.1
  complexity:  WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> ireserve 3:id,10:name,2:country a
    (integer) 1
    127.0.0.1:6379> get a
    "               "
