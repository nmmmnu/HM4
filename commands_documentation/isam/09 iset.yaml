- id:          ISET
  name:        ISET

  usage:       ISET schema key field val [field val ...]
  params:
    items:
    - k: schema
      v: field definitions in format size:field_name,size:field_name,...
    - k: key
      v: the key holding the fixed-width string
    - k: field
      v: the name of the field to update
    - k: val
      v: the new value for the field

  description: |
    Selectively updates one or more *field* within the isam object at the specified *key*.<br />
    The new values are written directly onto their exact byte positions inside the existing string layout, leaving unspecified fields untouched.<br />
    Shorter values are padded with trailing spaces. Values exceeding their allocated field size are truncated automatically.

  return_type: integer
  return:      1
  version:     1.3.14.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> isetall 3:id,10:name,2:country a 1 Niki BG
    (integer) 1
    127.0.0.1:6379> get a
    "1  Niki      BG"
    127.0.0.1:6379> iset 3:id,10:name,2:country a name Robert country US
    (integer) 1
    127.0.0.1:6379> get a
    "1  Robert    US"
