- id:      SLCOUNT
  name:    SLCOUNT
  aliases:
    items:
      - sllen
  usage:   SLCOUNT key
  params:
    items:
    - k: key
      v: name of the string list object

  description: |
    <p>Returns the exact number of elements (strings) currently stored in the string list *key*.</p>
    <p>This command performs a lightning-fast <b>O(1)</b> lookup, as it evaluates the exact memory bounds without needing to iterate through the data.</p>

  return_type: integer
  return:      the number of elements in the string list, or 0 if the key does not exist
  version:     1.3.15.1
  complexity:  READ
  mutable:     false
  compatible:  false
  alias:       SLLEN
  example:     |
    127.0.0.1:6379> sladd a Germany USA UK Denmark
    (integer) 1
    127.0.0.1:6379> slcount a
    (integer) 4
