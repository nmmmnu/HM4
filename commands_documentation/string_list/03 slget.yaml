- id:      SLGET
  name:    SLGET
  usage:   SLGET key index
  params:
    items:
    - k: key
      v: name of the string list object
    - k: index
      v: 0-based chronological index of the item to retrieve

  description: |
    <p>Retrieves a specific item from the string list *key* by its zero-based chronological index.</p>
    <p>If the specified index is out of bounds (greater than or equal to the total number of elements), the command safely returns an empty string (<b>""</b>).</p>

  return_type: string
  return:      the requested string
  version:     1.3.15.1
  complexity:  READ
  mutable:     false
  compatible:  false
  example:     |
    127.0.0.1:6379> sladd a Germany USA UK Denmark
    (integer) 1
    127.0.0.1:6379> slget a 3
    "Denmark"
    127.0.0.1:6379> slget a 100
    ""

  see_also:
    items:
      - SLMGET
      - SLGETALL

