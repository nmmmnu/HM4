- id:      RBADD
  name:    RBADD
  aliases:
    items:
      - rbpush
  usage:   RBADD key item0 [item1]...
  params:
    items:
    - k: key
      v: name of the string list object
    - k: item0
      v: value to be added

  description: |
    <p>Add *item0*, *item1*... into the string list object *key*.</p>
    <p>When it add the items, it may or may not leave some free space at the end of the key in order to speed up subsequent calls
    to <b>RBADD</b> and <b>RBADDPACK</b> in the future. This behaviour is similar to std::vector in C++.</p>

  return_type: integer
  return:      |
    always returns 1

  version:     1.3.15.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> sladd a Germany USA
    (integer) 1

  see_also:
    items:
      - SLADDPACK
