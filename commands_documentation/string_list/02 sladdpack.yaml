- id:      SLADDPACK
  name:    SLADDPACK
  aliases:
    items:
      - sladdshort
      - slpushpack
      - slpushshort
  usage:   SLADDPACK key item0 [item1]...
  params:
    items:
    - k: key
      v: name of the string list object
    - k: item0
      v: value to be added

  description: |
    <p>Add *item0*, *item1*... into the string list object *key*.</p>
    <p>Unlike <b>RBADD</b>, this command does not leave some free space at the end of the key, however it does not strip the free space if it is already available.</p>

  return_type: integer
  return:      |
    always returns 1

  version:     1.3.15.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> sladdpack a Germany USA
    (integer) 1

  see_also:
    items:
      - SLADD

