- id:       CFRESERVE
  name:     CFRESERVE
  usage:    CFRESERVE key width fingerprint_size
  params:
    items:
    - k: key
      v: name of the cuckoo filter object
    - k: width
      v: size of the object
    - k: fingerprint_size
      v: fingerprint size - 8, 16 or 32 bits are supported.

  return_type: bool
  return:      always returns 1
  version:     1.3.15.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  description: |
    <p>Create new, empty cuckoo filter object *key*</p>

  example:     |
    127.0.0.1:6379> cfreserve mycf 1024 16
    (integer) 1

