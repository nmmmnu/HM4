- id:          CFMEXISTS
  name:        CFMEXISTS
  usage:       CFMEXISTS key width fingerprint_size item [item]...]
  params:
    items:
    - k: key
      v: name of the cuckoo filter object
    - k: width
      v: size of the object
    - k: fingerprint_size
      v: fingerprint size - 8, 16 or 32 bits are supported.
    - k: item
      v: item(s) to check in the cuckoo filter

  return_type: array
  return:      array of results
  version:     1.3.15.1
  complexity:  READ
  mutable:     false
  compatible:  false
  description: |
    <p>Checks whether one or more items exist in the cuckoo filter object *key*. Returns 1 if an item is likely in the set, and 0 if it is definitely not.</p>

  example:     |
    127.0.0.1:6379> cfexists mycf 1024 16 user:1001
    (integer) 1
    127.0.0.1:6379> cfexists mycf 1024 16 user:9999
    (integer) 0
    127.0.0.1:6379> cfmexists mycf 1024 16 user:1001 user:9999
    1) "1"
    2) "0"

  see_also:
    items:
      - CFEXISTS

