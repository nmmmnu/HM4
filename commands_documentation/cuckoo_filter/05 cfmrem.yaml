- id:          CFMREM
  name:        CFMREM
  usage:       CFMREM key width fingerprint_size item [item]...
  params:
    items:
    - k: key
      v: name of the cuckoo filter object
    - k: width
      v: size of the object
    - k: fingerprint_size
      v: fingerprint size - 8, 16 or 32 bits are supported.
    - k: item
      v: item(s) to remove from the cuckoo filter

  return_type: array
  return:      array of results
  version:     1.3.15.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  description: |
    <p>Removes one or more items from the cuckoo filter object *key* without corrupting the filter's state.</p>

  example:     |
    127.0.0.1:6379> cfrem mycf 1024 16 user:1001
    (integer) 1
    127.0.0.1:6379> cfmrem mycf 1024 16 user:1002 user:1003
    1) "1"
    2) "1"

  see_also:
    items:
      - CFREM
