- id:          UNIQUEID
  name:        UNIQUEID
  aliases:
    items:
      - uniqueid

  usage:       UNIQUEID
  usage:       UNIQUEID seed
  params:
    items:
    - k: seed
      v: value for last byte 0 - 255

  description: |
    Generate fast and reliable <b>non-cryptographic</b>, <time based</b>, <b>sortable</b> unique identifier.<br />
    Optionaly you can provide a seed for last byte 0 - 255.

  return_type: string
  return:      unique identifier
  version:     1.3.15
  mutable:     false
  compatible:  false
  example:     |
    127.0.0.1:6379> uniqueid
    "69e090d0011c5900"
    127.0.0.1:6379> uniqueid 56
    "69e0917c0d50a938"

