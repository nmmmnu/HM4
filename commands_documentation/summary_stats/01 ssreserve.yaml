- id:       SSRESERVE
  name:     SSRESERVE
  usage:    SSRESERVE key
  params:
    items:
    - k: key
      v: name of the summary_stats object

  description: |
    <p>Create new, empty summary_stats object *key*.</p>

  return_type: bool
  return:      always returns 1
  version:     1.3.15.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> ssreserve a
    (integer) 1

