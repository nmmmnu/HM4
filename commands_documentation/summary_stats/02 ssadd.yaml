- id:        SSADD
  name:      SSADD
  usage:     SSADD key value [value ...]
  params:
    items:
    - k: key
      v: name of the summary_stats object
    - k: value
      v: numeric value to be accumulated into the statistical block

  description: |
    <p>Accumulate one or multiple numeric values into the summary_stats object *key*.</p>
    <p>If the target *key* does not exist, it will be implicitly created and initialized before the accumulation begins.</p>

  return_type: bool
  return:      always returns 1
  version:     1.3.15.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> ssadd a 1
    (integer) 1
    127.0.0.1:6379> ssadd a 2 3 4
    (integer) 1

