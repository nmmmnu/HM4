- id:      RBCOUNT
  name:    RBCOUNT
  aliases:
    items:
      - RBLEN
  usage:   RBCOUNT key rb_count rb_value_size
  params:
    items:
    - k: key
      v: name of the ring buffer object
    - k: rb_count
      v: capacity of the object - sizes from 1 to 200 are supported.
    - k: rb_value_size
      v: fixed value size, see the table

  description: |
    <p>Returns the exact number of active elements currently stored in the ring buffer *key*.<br />
    The returned value will be an integer between 0 and <b>rb_count</b>.</p>

    <table border="1" class="x">
      <tr><th>Value</th><th>Size</th><th>Comment</th></tr>
      <tr><td align="right">  16</td><td align="right">  15</td><td>IP4</td></tr>
      <tr><td align="right">  32</td><td align="right">  31</td><td>&nbsp;</td></tr>
      <tr><td align="right">  40</td><td align="right">  39</td><td>IP6</td></tr>
      <tr><td align="right">  64</td><td align="right">  64</td><td></td></tr>
      <tr><td align="right"> 128</td><td align="right"> 127</td><td></td></tr>
      <tr><td align="right"> 256</td><td align="right"> 255</td><td>Pascal string</td></tr>
      <tr><td align="right"> 512</td><td align="right"> 510</td><td></td></tr>
      <tr><td align="right">1024</td><td align="right">1022</td><td></td></tr>
    </table>

  return_type: int
  return:      number of items
  version:     1.3.15.1
  complexity:  READ
  mutable:     false
  compatible:  false
  example:     |
    127.0.0.1:6379> del myrs
    (integer) 1
    127.0.0.1:6379> rsadd myrs 5 64 google yahoo cloudflare outlook facebook amazon
    (integer) 1
    127.0.0.1:6379> rsadd myrs 5 64 oracle hotmail softlayer
    (integer) 1
    127.0.0.1:6379> rsadd myrs 5 64 wikipedia
    (integer) 0
    127.0.0.1:6379> rsget myrs 5 64
    1) "google"
    2) "oracle"
    3) "cloudflare"
    4) "outlook"
    5) "facebook"
    127.0.0.1:6379> rscount myrs 5 64
    (integer) 9
