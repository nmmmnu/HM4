id:          RING_BUFFER
name:        RING_BUFFER

version:     1.3.15.1

description: |
  <p>This module implements a <b>high-performance ring buffer</b> (circular queue) - a data structure that uses a single,
  fixed-size block of memory as if it were connected end-to-end. It is highly optimized for fast FIFO (First-In, First-Out) data streaming.</p>

  <p><b>What It Does:</b></p>

  <p><b>1. Fixed-size circular storage with auto-overwrite</b></p>
  <p>You can push any number of values into the ring buffer using <b>RBADD</b> (alias <b>RBPUSH</b>).
  Once the buffer reaches its maximum capacity (<b>rb_count</b>), new incoming items automatically
  overwrite the oldest ones. This completely eliminates the need for shifting elements or allocating memory at runtime.</p>

  <p><b>2. Supports fixed-size values</b></p>
  <p>Each item stored in the buffer maps to a predefined slot size (<b>rb_value_size</b>).
  This guarantees zero memory fragmentation and deterministic performance under heavy loads.</p>

    <table border="1" class="x">
      <tr><th>Value</th><th>Size</th><th>Comment</th></tr>
      <tr><td align="right">  16</td><td align="right">  15</td><td>IP4</td></tr>
      <tr><td align="right">  32</td><td align="right">  31</td><td>&nbsp;</td></tr>
      <tr><td align="right">  40</td><td align="right">  39</td><td>IP6</td></tr>
      <tr><td align="right">  64</td><td align="right">  64</td><td></td></tr>
      <tr><td align="right"> 128</td><td align="right"> 127</td><td></td></tr>
      <tr><td align="right"> 256</td><td align="right"> 255</td><td>Pascal string</td></tr>
      <tr><td align="right"> 512</td><td align="right"> 510</td><td></td></tr>
      <tr><td align="right">1024</td><td align="right">1022</td><td></td></tr>
    </table>

  <p><b>3. Multi-item insertion</b></p>
  <p><b>RBADD</b> supports batch insertion, allowing multiple values to be pushed in a single command. It returns <b>1</b> upon successful processing.</p>

  <p><b>4. Non-destructive peeking</b></p>
  <p>You can retrieve the current active items in their exact chronological order using <b>RBGET</b> without removing them.</p>

  <p><b>5. Destructive popping (FIFO)</b></p>
  <p><b>RBPOP</b> extracts and returns the oldest active item from the buffer, advancing the internal head pointer.
  If the buffer is empty, it safely returns an empty string (<b>""</b>) to prevent underflow errors.</p>

  <p><b>6. Tracking active elements</b></p>
  <p><b>RBCOUNT</b> (alias <b>RBLEN</b>) returns the exact number of active elements currently held in the buffer (ranging from 0 up to <b>rb_count</b>).</p>

  <p><b>Use Cases:</b></p>
  <ul>
    <li>Sliding window logging and telemetry tracking</li>
    <li>High-throughput message queues and streaming buffers</li>
    <li>Time-series metrics caching</li>
    <li>Decoupling fast producers from slower asynchronous consumers</li>
  </ul>

  <p><b>Tip:</b> To clear or reset the ring buffer completely, use the global <b>DEL</b> command on the key. This will instantly release the allocated slot memory.</p>

example_module:     |
  127.0.0.1:6379> del myrb
  (integer) 1
  127.0.0.1:6379> rbadd myrb 5 64 google yahoo cloudflare outlook facebook amazon
  (integer) 1
  127.0.0.1:6379> rbadd myrb 5 64 oracle hotmail softlayer
  (integer) 1
  127.0.0.1:6379> rbget myrb 5 64
  1) "facebook"
  2) "amazon"
  3) "oracle"
  4) "hotmail"
  5) "softlayer"
  127.0.0.1:6379> rbadd myrb 5 64 wikipedia
  (integer) 1
  127.0.0.1:6379> rbcount myrb 5 64
  (integer) 5
  127.0.0.1:6379> rbpop myrb 5 64
  "amazon"
  127.0.0.1:6379> rbpop myrb 5 64
  "oracle"
  127.0.0.1:6379> rbpop myrb 5 64
  "hotmail"
  127.0.0.1:6379> rbpop myrb 5 64
  "softlayer"
  127.0.0.1:6379> rbpop myrb 5 64
  "wikipedia"
  127.0.0.1:6379> rbpop myrb 5 64
  ""
  127.0.0.1:6379> rbpop myrb 5 64
  ""
