- id:      RBADD
  name:    RBADD
  aliases:
    items:
      - rbpush
  usage:   RBADD key rb_count rb_value_size item0 [item1]...
  params:
    items:
    - k: key
      v: name of the ring buffer object
    - k: rb_count
      v: capacity of the object - sizes from 1 to 200 are supported.
    - k: rb_value_size
      v: fixed value size, see the table
    - k: item0
      v: value to be added

  description: |
    <p>Add *item0*, *item1*... into the ring buffer object *key*.<br />
    If the buffer reaches its maximum capacity (<b>rb_count</b>), new incoming items automatically overwrite the oldest ones (FIFO order).</p>

    <table border="1" class="x">
      <tr><th>Value</th><th>Size</th><th>Comment</th></tr>
      <tr><td align="right">  16</td><td align="right">  15</td><td>IP4</td></tr>
      <tr><td align="right">  32</td><td align="right">  31</td><td>&nbsp;</td></tr>
      <tr><td align="right">  40</td><td align="right">  39</td><td>IP6</td></tr>
      <tr><td align="right">  64</td><td align="right">  64</td><td></td></tr>
      <tr><td align="right"> 128</td><td align="right"> 127</td><td></td></tr>
      <tr><td align="right"> 256</td><td align="right"> 255</td><td>Pascal string</td></tr>
      <tr><td align="right"> 512</td><td align="right"> 510</td><td></td></tr>
      <tr><td align="right">1024</td><td align="right">1022</td><td></td></tr>
    </table>

  return_type: integer
  return:      |
    always returns 1

  version:     1.3.15.1
  complexity:  READ + WRITE
  mutable:     true
  compatible:  false
  example:     |
    127.0.0.1:6379> del myrb
    (integer) 1
    127.0.0.1:6379> rbadd myrb 5 64 google yahoo cloudflare outlook facebook amazon
    (integer) 1
    127.0.0.1:6379> rbadd myrb 5 64 oracle hotmail softlayer
    (integer) 1
    127.0.0.1:6379> rbadd myrb 5 64 wikipedia
    (integer) 1
    127.0.0.1:6379> rsget myrb 5 64
    1) "amazon"
    2) "oracle"
    3) "hotmail"
    4) "softlayer"
    5) "wikipedia"
    127.0.0.1:6379> rbgetcount myrb 5 64
    (integer) 5

